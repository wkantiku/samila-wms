# ══════════════════════════════════════════════════════════════════
#  Samila WMS 3PL — Render.com (Backend only)
#  Database: Neon.tech (set DATABASE_URL manually)
#  Frontend: Vercel (deploy separately)
# ══════════════════════════════════════════════════════════════════

services:
  - type: web
    name: samila-wms-backend
    runtime: docker
    dockerfilePath: BACKEND/Dockerfile
    dockerContext: BACKEND
    branch: master
    plan: free
    healthCheckPath: /health
    envVars:
      # ── Database (paste Neon.tech connection string) ──────────
      - key: DATABASE_URL
        sync: false          # กรอกเองใน Render Dashboard

      # ── JWT ──────────────────────────────────────────────────
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"

      # ── CORS (paste Vercel URL หลัง deploy frontend) ─────────
      - key: ALLOWED_ORIGINS
        sync: false          # e.g. https://samila-wms.vercel.app

      # ── Trusted hosts ─────────────────────────────────────────
      - key: ALLOWED_HOSTS
        value: "samila-wms-backend.onrender.com,localhost,127.0.0.1"

      # ── Superadmin password ───────────────────────────────────
      - key: REACT_APP_SA_PASS
        sync: false          # ตั้งรหัสผ่าน superadmin
