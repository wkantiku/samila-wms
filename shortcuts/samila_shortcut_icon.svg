<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="128" fill="#f0f4ff"/>
  
  <!-- Logo text: SAMILA -->
  <text x="128" y="180" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="#667eea">
    SAMILA
  </text>
  
  <!-- Logo icon - simplified version -->
  <g transform="translate(128, 80)">
    <!-- Water/Wave element (blue) -->
    <path d="M -40 20 Q -30 10 -20 20 Q -10 30 0 20 Q 10 10 20 20 Q 30 30 40 20" 
          fill="none" stroke="#667eea" stroke-width="2"/>
    <!-- Warehouse building (purple) -->
    <rect x="-30" y="20" width="60" height="30" fill="#764ba2" opacity="0.3"/>
  </g>
  
  <!-- Text label -->
  <text x="128" y="245" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#999">
    Warehouse Management
  </text>
</svg>
