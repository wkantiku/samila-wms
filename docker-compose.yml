version: '3.9'

# ── Samila WMS Docker Compose ──────────────────────────
# Samila Innovation © 2026
# Usage: docker compose up -d

services:

  # ── PostgreSQL Database ──────────────────────────
  db:
    image: postgres:15-alpine
    container_name: samila_wms_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-samila}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-samila_password}
      POSTGRES_DB: ${POSTGRES_DB:-samila_wms}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - samila_wms_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-samila}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # ไม่ expose port 5432 ออกนอก (security)

  # ── FastAPI Backend ───────────────────────────────
  backend:
    build:
      context: ./BACKEND
      dockerfile: Dockerfile
    container_name: samila_wms_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://samila:samila_password@db:5432/samila_wms}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - samila_wms_net
    # ไม่ expose port 8000 ออกนอก (ผ่าน nginx เท่านั้น)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── React Frontend (Nginx) ────────────────────────
  frontend:
    build:
      context: ./FRONTEND
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost/api}
        REACT_APP_VERSION: "1.0.0"
        REACT_APP_NAME: "Samila WMS"
    container_name: samila_wms_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - samila_wms_net

# ── Volumes ───────────────────────────────────────
volumes:
  db_data:
    driver: local

# ── Networks ──────────────────────────────────────
networks:
  samila_wms_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
